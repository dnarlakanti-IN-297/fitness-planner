apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-planner
  labels:
    app: fitness-planner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fitness-planner
  template:
    metadata:
      labels:
        app: fitness-planner
    spec:
      containers:
      - name: fitness-planner
        image: nginx:alpine  # Demo: Will be replaced with dnarlakanti/fitness-planner:TAG by Unify
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
