apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-planner
  labels:
    app: fitness-planner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fitness-planner
  template:
    metadata:
      labels:
        app: fitness-planner
    spec:
      containers:
      - name: fitness-planner
        image: dnarlakanti/fitness-planner:f587efef63e3e99493d24ea4478a4cd6c5456d9d
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PORT
          value: "8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
