apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-planner
  labels:
    app: fitness-planner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fitness-planner
  template:
    metadata:
      labels:
        app: fitness-planner
    spec:
      containers:
      - name: fitness-planner
        image: IMAGE_PLACEHOLDER  # Will be replaced by deploy workflow
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PORT
          value: "8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
