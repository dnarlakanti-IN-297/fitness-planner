[pytest]
# Pytest configuration for Fitness Planner

# Register custom markers
markers =
    integration: Integration tests that test multiple components together (slower)
    slow: Tests that intentionally take longer (> 0.5s)
    unit: Fast unit tests (default)

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Coverage settings
[coverage:run]
source = app
omit =
    */tests/*
    */test_*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
