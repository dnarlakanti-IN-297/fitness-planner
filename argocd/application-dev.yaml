apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fitness-planner-qa
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/dnarlakanti-IN-297/fitness-planner.git
    targetRevision: develop  # QA environment tracks develop branch
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: fitness-planner-qa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
