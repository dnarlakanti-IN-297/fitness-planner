apiVersion: automation.cloudbees.io/v1alpha1
kind: action
name: publish-argocd-evidence
description: Publishes ArgoCD deployment evidence to CloudBees Unify

inputs:
  image-tag:
    description: 'Docker image tag deployed'
    required: true
  deployment-status:
    description: 'Deployment status (success/failed)'
    required: true
  argocd-app-name:
    description: 'ArgoCD application name'
    required: false
    default: 'fitness-planner'

runs:
  using: composite
  steps:
    - name: Publish ArgoCD deployment evidence
      uses: cloudbees-io/publish-evidence-item@v1
      with:
        content: |
          # ArgoCD Deployment Evidence

          ## Deployment Summary
          - **Status**: ${{ inputs.deployment-status }}
          - **Image Tag**: `${{ inputs.image-tag }}`
          - **ArgoCD Application**: `${{ inputs.argocd-app-name }}`
          - **Namespace**: `fitness-planner`

          ## Workflow Information
          - **Run ID**: `${{ cloudbees.run_id }}`
          - **Branch**: `${{ cloudbees.scm.branch }}`
          - **Commit SHA**: `${{ cloudbees.scm.sha }}`
          - **Repository**: `${{ cloudbees.scm.repository }}`
          - **Triggered By**: `${{ cloudbees.actor }}`

          ## Deployment Details
          - **Image**: `dnarlakanti/fitness-planner:${{ inputs.image-tag }}`
          - **Manifest Path**: `k8s/deployment.yaml`
          - **Deployment Type**: GitOps via ArgoCD
          - **Auto-Sync**: Enabled (3-minute polling)

          ## What Happens Next
          1. ✅ Manifest updated in Git
          2. ⏳ ArgoCD detects change (within 3 minutes)
          3. 🚀 ArgoCD syncs to Kubernetes cluster
          4. ✅ New pods deployed automatically

          ## Verification
          To verify deployment in ArgoCD:
          ```bash
          # CLI
          argocd app get ${{ inputs.argocd-app-name }}

          # kubectl
          kubectl get pods -n fitness-planner
          kubectl get deployment fitness-planner -n fitness-planner -o yaml | grep image:

          # UI
          https://localhost:8080 (after port-forward)
          ```

          ## Rollback Instructions
          If issues occur, rollback via:
          ```bash
          # Option 1: ArgoCD rollback
          argocd app history ${{ inputs.argocd-app-name }}
          argocd app rollback ${{ inputs.argocd-app-name }} <REVISION>

          # Option 2: Git revert
          git revert ${{ cloudbees.scm.sha }}
          git push origin main
          ```

          ---
          *Generated by CloudBees Unify + ArgoCD GitOps Pipeline*
