# CloudBees Unify Component: Test and Publish Results
# ✅ Updated with CloudBees Unify syntax
#
# TODO: Verify if components use the same apiVersion/kind format
# or if they have a different structure in CloudBees Unify

apiVersion: automation.cloudbees.io/v1alpha1
kind: action
name: test-and-publish
description: 'Runs Python tests with pytest and publishes test results'

# TODO: Verify input syntax for CloudBees components
inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'

# TODO: Verify how to define component steps in CloudBees Unify
runs:
  using: 'composite'
  steps:
    # Step 1: Set up Python
    - name: Set up Python
      uses: cloudbees-io/configure-python-version@v1
      with:
        version: ${{ inputs.python-version }}

    # Step 2: Install dependencies
    - name: Install dependencies
      uses: docker://python:3.11-slim
      shell: sh
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 3: Run tests
    - name: Run tests with pytest
      uses: docker://python:3.11-slim
      shell: sh
      run: |
        pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=app --cov-report=xml --cov-report=html --cov-report=term

    # Step 4: Publish test results
    - name: Publish test results
      uses: cloudbees-io/publish-test-results@v2
      with:
        test-type: JUNIT
        results-path: test-results.xml

    # Step 5: Extract test summary
    - name: Extract test summary
      id: test-summary
      uses: docker://alpine:latest
      shell: sh
      run: |
        apk add --no-cache grep
        TOTAL=$(grep -oP 'tests="\K[0-9]+' test-results.xml || echo "0")
        FAILURES=$(grep -oP 'failures="\K[0-9]+' test-results.xml || echo "0")
        ERRORS=$(grep -oP 'errors="\K[0-9]+' test-results.xml || echo "0")
        PASSED=$((TOTAL - FAILURES - ERRORS))
        echo "$TOTAL" > $CLOUDBEES_OUTPUTS/TOTAL_TESTS
        echo "$PASSED" > $CLOUDBEES_OUTPUTS/PASSED_TESTS
        echo "$FAILURES" > $CLOUDBEES_OUTPUTS/FAILED_TESTS

    # Step 6: Publish test evidence
    - name: Publish test evidence
      uses: https://github.com/cloudbees-io/publish-evidence-item@v1
      with:
        content: |-
          # Fitness Planner - Test Execution Evidence

          ## Summary
          - **Total Test Cases**: ${{ steps.test-summary.outputs.TOTAL_TESTS }}
          - **Passed**: ${{ steps.test-summary.outputs.PASSED_TESTS }}
          - **Failed**: ${{ steps.test-summary.outputs.FAILED_TESTS }}

          ## Workflow Information
          - **Run ID**: ${{ cloudbees.run_id }}
          - **Branch**: ${{ cloudbees.scm.branch }}
          - **Commit**: ${{ cloudbees.scm.sha }}

          ## Test Details
          - **Test Framework**: pytest
          - **Test Type**: JUNIT XML
          - **Results File**: test-results.xml
