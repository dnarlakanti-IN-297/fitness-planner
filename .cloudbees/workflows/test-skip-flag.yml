apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Test Skip Flag

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        type: boolean
        description: 'Skip test execution?'
        required: false
        default: false

permissions:
  id-token: read

jobs:
  build:
    steps:
      - name: Show input value
        uses: docker://alpine:latest
        shell: sh
        run: |
          echo "=========================================="
          echo "Input parameter received:"
          echo "skip_tests = ${{ inputs.skip_tests }}"
          echo "=========================================="

      - name: Run tests
        uses: docker://alpine:latest
        shell: sh
        run: |
          SKIP="${{ inputs.skip_tests }}"

          if [ "${SKIP}" = "true" ]; then
            echo "⏭️  SKIPPING TESTS (skip_tests = true)"
            echo "Tests would be skipped here"
          else
            echo "🧪 RUNNING TESTS (skip_tests = false)"
            echo "Test 1: Running..."
            echo "Test 2: Running..."
            echo "Test 3: Running..."
            echo "✅ All tests passed!"
          fi

      - name: Summary
        uses: docker://alpine:latest
        shell: sh
        run: |
          echo ""
          echo "=========================================="
          echo "Result: Input parameter worked!"
          echo "You set skip_tests = ${{ inputs.skip_tests }}"
          echo "=========================================="
