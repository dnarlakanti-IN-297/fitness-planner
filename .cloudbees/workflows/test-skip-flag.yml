apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Test Skip Flag

on:
  workflow_dispatch:
    inputs:
      test_skip_flag:
        type: boolean
        description: 'Skip test execution?'
        required: false
        default: false

permissions:
  id-token: read

jobs:
  build:
    steps:
      - name: Show input value
        uses: docker://alpine:latest
        shell: sh
        run: |
          echo "=========================================="
          echo "Input parameter received:"
          echo "test_skip_flag = ${{ inputs.test_skip_flag }}"
          echo "=========================================="

      - name: Run tests
        id: test-execution
        uses: docker://alpine:latest
        shell: sh
        run: |
          SKIP="${{ inputs.test_skip_flag }}"

          if [ "${SKIP}" = "true" ]; then
            echo "⏭️  SKIPPING TESTS (test_skip_flag = true)"
            echo "Tests would be skipped here"
            echo "skipped" > $CLOUDBEES_OUTPUTS/test_status
            echo "0" > $CLOUDBEES_OUTPUTS/test_count
          else
            echo "🧪 RUNNING TESTS (test_skip_flag = false)"
            echo "Test 1: API endpoint test... ✅"
            echo "Test 2: Database connection test... ✅"
            echo "Test 3: Authentication test... ✅"
            echo "Test 4: Calculator test... ✅"
            echo "Test 5: Workout engine test... ✅"
            echo "✅ All 5 tests passed!"
            echo "completed" > $CLOUDBEES_OUTPUTS/test_status
            echo "5" > $CLOUDBEES_OUTPUTS/test_count
          fi

      - name: Summary
        uses: docker://alpine:latest
        shell: sh
        run: |
          echo ""
          echo "=========================================="
          echo "Result: Input parameter worked!"
          echo "You set test_skip_flag = ${{ inputs.test_skip_flag }}"
          echo "Test status: ${{ steps.test-execution.outputs.test_status }}"
          echo "Tests run: ${{ steps.test-execution.outputs.test_count }}"
          echo "=========================================="

      - name: Publish Test Evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            # Test Execution Evidence

            ## Test Configuration
            - **Skip Tests Flag**: `${{ inputs.test_skip_flag }}`
            - **Test Status**: ${{ steps.test-execution.outputs.test_status }}

            ## Test Results
            ${{ steps.test-execution.outputs.test_status == 'skipped' && '⏭️ **Tests were SKIPPED**' || format('✅ **Tests Executed Successfully**\n\n- Total Tests Run: **{0}**\n- Passed: **{0}**\n- Failed: **0**', steps.test-execution.outputs.test_count) }}

            ## Workflow Information
            - **Run ID**: `${{ cloudbees.run_id }}`
            - **Branch**: `${{ cloudbees.scm.branch }}`
            - **Commit SHA**: `${{ cloudbees.scm.sha }}`

            ---
            *Generated by Test Skip Flag Demo*
