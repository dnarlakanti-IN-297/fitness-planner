apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Release to Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Target environment'
        required: true
        default: 'qa'
        options:
          - qa
          - staging
          - production

permissions:
  scm-token-own: write
  id-token: write

jobs:
  deploy-to-environment:
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Deploy to selected environment
        uses: docker://alpine/git:latest
        shell: sh
        run: |
          echo "=========================================="
          echo "TESTING PARAMETER ACCESS"
          echo "=========================================="

          echo "Test 1 - inputs.environment: ${{ inputs.environment }}"
          echo "Test 2 - vars.environment: ${{ vars.environment }}"
          echo "Test 3 - env.ENVIRONMENT: ${ENVIRONMENT:-not-set}"
          echo "Test 4 - env.environment: ${environment:-not-set}"

          echo ""
          echo "All environment variables:"
          env | grep -i env || echo "No env vars found"

          echo "=========================================="

          # Try to get environment from multiple sources
          ENV="${{ inputs.environment }}"
          if [ -z "$ENV" ] || [ "$ENV" = "" ]; then
            ENV="${{ vars.environment }}"
          fi
          if [ -z "$ENV" ] || [ "$ENV" = "" ]; then
            ENV="${ENVIRONMENT:-qa}"
          fi

          IMAGE_TAG="${{ cloudbees.scm.sha }}"

          echo ""
          echo "DEPLOYING TO: ${ENV}"
          echo "IMAGE TAG: ${IMAGE_TAG}"
          echo "=========================================="

          # Determine ArgoCD application and namespace
          case "${ENV}" in
            qa)
              ARGOCD_APP="fitness-planner-qa"
              NAMESPACE="fitness-planner-qa"
              BRANCH="develop"
              ;;
            staging)
              ARGOCD_APP="fitness-planner-staging"
              NAMESPACE="fitness-planner-staging"
              BRANCH="main"
              ;;
            production)
              ARGOCD_APP="fitness-planner-prod"
              NAMESPACE="fitness-planner-prod"
              BRANCH="main"
              ;;
            *)
              echo "❌ Invalid environment: ${ENV}"
              exit 1
              ;;
          esac

          echo "ArgoCD App: ${ARGOCD_APP}"
          echo "Namespace: ${NAMESPACE}"
          echo "Branch: ${BRANCH}"

          # Update deployment manifest
          sed -i "s|image: dnarlakanti/fitness-planner:.*|image: dnarlakanti/fitness-planner:${IMAGE_TAG}|g" k8s/deployment.yaml
          sed -i "s|image: nginx:alpine.*|image: dnarlakanti/fitness-planner:${IMAGE_TAG}|g" k8s/deployment.yaml

          echo "✅ Manifest updated with image: dnarlakanti/fitness-planner:${IMAGE_TAG}"

          # Configure git
          git config user.name "CloudBees Unify Release Bot"
          git config user.email "release-bot@cloudbees.com"

          # Commit and push
          git add k8s/deployment.yaml

          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "Release to ${ENV}: image ${IMAGE_TAG} [skip ci]"
            git push origin ${BRANCH}
            echo "✅ Pushed to ${BRANCH} branch"
          fi

          echo ""
          echo "=========================================="
          echo "✅ DEPLOYMENT INITIATED TO: ${ENV}"
          echo "=========================================="
          echo ""
          echo "ArgoCD will sync within 3 minutes"
          echo "Or manually sync with: argocd app sync ${ARGOCD_APP}"

      - name: Publish release evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            # Release Deployment Evidence

            ## Release Summary
            - **Environment**: `${{ inputs.environment }}`
            - **Image Tag**: `${{ cloudbees.scm.sha }}`
            - **Status**: Success

            ## Workflow Information
            - **Run ID**: `${{ cloudbees.run_id }}`
            - **Branch**: `${{ cloudbees.scm.branch }}`
            - **Commit SHA**: `${{ cloudbees.scm.sha }}`
            - **Repository**: `${{ cloudbees.scm.repository }}`

            ## Deployment Details
            - **Image**: `dnarlakanti/fitness-planner:${{ cloudbees.scm.sha }}`
            - **Deployment Method**: GitOps via ArgoCD
            - **Auto-Sync**: Enabled (3-minute polling)

            ## Next Steps
            ArgoCD will automatically deploy to the selected environment.

            ---
            *Generated by CloudBees Unify Release Workflow*
