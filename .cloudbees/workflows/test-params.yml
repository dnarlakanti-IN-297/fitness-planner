apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Test Parameters

on:
  workflow_dispatch:
    inputs:
      environment:
        type: string
        description: 'Target environment (dev/staging/prod)'
        required: true
        default: 'dev'

permissions:
  id-token: read

jobs:
  test-inputs:
    steps:
      - name: Test parameter syntax
        uses: docker://alpine:latest
        shell: sh
        run: |
          echo "=========================================="
          echo "TESTING PARAMETER SYNTAX"
          echo "=========================================="
          echo ""

          echo "Test 1 - inputs.environment:"
          echo "${{ inputs.environment }}"
          echo ""

          echo "Test 2 - vars.environment:"
          echo "${{ vars.environment }}"
          echo ""

          echo "Test 3 - ENV VAR ENVIRONMENT:"
          echo "${ENVIRONMENT:-not-found}"
          echo ""

          echo "Test 4 - ENV VAR environment:"
          echo "${environment:-not-found}"
          echo ""

          echo "=========================================="
          echo "DONE - Check which test showed your value!"
          echo "=========================================="
