# CloudBees Unify Main CI Workflow
# ✅ Updated with correct CloudBees Unify syntax

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: CI Workflow

# Triggers
on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

# CloudBees Unify permissions
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: read

jobs:
  # Job 1: Test with Smart Tests
  test:
    env:
      SMART_TESTS_TOKEN: ${{ secrets.SMART_TESTS_TOKEN }}

    steps:
      # Step 1: Checkout code with full history for Smart Tests
      - name: Checkout code
        uses: cloudbees-io/checkout@v1
        with:
          fetch-depth: 0  # Full git history for better test predictions

      # Step 2: Verify Smart Tests connectivity
      - name: Verify Smart Tests connectivity
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "Verifying Smart Tests configuration..."
          smart-tests verify || true
          echo "✅ Smart Tests verified"

      # Step 3: Record build with Smart Tests
      - name: Record build with Smart Tests
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "📝 Recording build context..."
          smart-tests record build --build ${{ cloudbees.run_id }} --source app=.
          echo "✅ Build recorded: ${{ cloudbees.run_id }}"

      # Step 4: Record session with Smart Tests
      - name: Record session with Smart Tests
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "📝 Recording observation session..."
          smart-tests record session --build ${{ cloudbees.run_id }} --observation --test-suite pytest-unit-integration-tests > session.txt
          cat session.txt
          echo "✅ Session recorded"

      # Step 5: Discover and filter test files
      - name: Discover tests for Smart Tests subset
        uses: docker://python:3.11-slim
        shell: sh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          echo "🔍 Discovering test files..."

          # Find all test files, excluding helper files
          find tests/ -type f -name "test_*.py" -o -name "*_test.py" | \
            grep -v "conftest.py" | \
            grep -v "__init__.py" | \
            grep -v "__pycache__" | \
            sort > all-tests.lst

          echo "📋 Discovered tests:"
          cat all-tests.lst

          # List all test functions for Smart Tests analysis
          pytest --collect-only -q tests/ 2>/dev/null | \
            grep "::" | \
            grep -v "conftest" > all-test-functions.lst || true

          echo "📋 Test functions discovered:"
          cat all-test-functions.lst

      # Step 6: Create Smart Tests subset
      - name: Create Smart Tests subset
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "🎯 Creating Smart Tests subset..."

          # Create intelligent subset based on code changes
          # Target 50% of tests (run only affected tests)
          smart-tests subset pytest \
            --session @session.txt \
            --target 50% \
            --test-list all-test-functions.lst > smart-tests-subset.txt || echo "tests/" > smart-tests-subset.txt

          echo "📊 Smart Tests subset created:"
          cat smart-tests-subset.txt

          # Count tests to run
          TEST_COUNT=$(cat smart-tests-subset.txt | wc -l | tr -d ' ')
          echo "📈 Running $TEST_COUNT tests based on Smart Tests analysis"

      # Step 7: Run tests with Smart Tests subset
      - name: Run Smart Tests subset
        uses: docker://python:3.11-slim
        shell: sh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          echo "🧪 Running Smart Tests subset..."

          # If subset contains specific test paths, use them
          if [ -s smart-tests-subset.txt ]; then
            echo "Running targeted test subset..."
            # Read subset file and run those tests
            cat smart-tests-subset.txt | xargs pytest -v --tb=short --junitxml=test-results.xml --cov=app --cov-report=xml --cov-report=html --cov-report=term
          else
            echo "Running all tests (no subset generated)..."
            pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=app --cov-report=xml --cov-report=html --cov-report=term
          fi

          echo "✅ Tests completed"

      # Step 8: Publish test results
      - name: Publish test results
        uses: cloudbees-io/publish-test-results@v2
        with:
          test-type: JUNIT
          results-path: test-results.xml

      # Step 9: Extract test summary
      - name: Extract test summary
        id: test-summary
        uses: docker://alpine:latest
        shell: sh
        run: |
          apk add --no-cache grep
          TOTAL=$(grep -oP 'tests="\K[0-9]+' test-results.xml || echo "0")
          FAILURES=$(grep -oP 'failures="\K[0-9]+' test-results.xml || echo "0")
          ERRORS=$(grep -oP 'errors="\K[0-9]+' test-results.xml || echo "0")
          PASSED=$((TOTAL - FAILURES - ERRORS))
          echo "$TOTAL" > $CLOUDBEES_OUTPUTS/TOTAL_TESTS
          echo "$PASSED" > $CLOUDBEES_OUTPUTS/PASSED_TESTS
          echo "$FAILURES" > $CLOUDBEES_OUTPUTS/FAILED_TESTS

      # Step 10: Publish test evidence using reusable component
      - name: Publish test evidence
        uses: ./.cloudbees/components/publish-test-evidence
        with:
          total-tests: ${{ steps.test-summary.outputs.TOTAL_TESTS }}
          passed-tests: ${{ steps.test-summary.outputs.PASSED_TESTS }}
          failed-tests: ${{ steps.test-summary.outputs.FAILED_TESTS }}

  # Job 2: Build and Push Docker Image
  # Calls the reusable build workflow
  build:
    needs: test
    uses: ./.cloudbees/workflows/build-reusable.yml
    with:
      image-name: fitness-planner
      dockerfile-path: ./Dockerfile
      context: .
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # Note: Deployment is handled separately through Unify Releases
  # Do not auto-deploy on every push - use release workflow instead
