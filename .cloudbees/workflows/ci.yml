# CloudBees Unify Main CI Workflow
# ✅ Updated with correct CloudBees Unify syntax

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: CI Workflow

# Triggers
on:
  push:
    branches:
      - main
      - develop
  # TODO: Verify manual trigger in CloudBees Unify
  # GitHub uses 'workflow_dispatch' - check if CloudBees is the same
  workflow_dispatch:

# CloudBees Unify permissions
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: read

jobs:
  # Job 1: Test
  test:
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      # Step 2: Install dependencies and run tests in Python container
      - name: Install dependencies and run tests
        uses: docker://python:3.11-slim
        shell: sh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest tests/ -v --tb=short --junitxml=test-results.xml

      # Step 3: Publish test results
      - name: Publish test results
        uses: cloudbees-io/publish-test-results@v2
        with:
          test-type: JUNIT
          results-path: test-results.xml

  # Job 2: Build and Push Docker Image
  build:
    needs: test
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Configure Docker Hub credentials
        id: dockerconfig
        uses: cloudbees-io/configure-oci-credentials@v1
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: kaniko-build
        uses: cloudbees-io/kaniko@v1
        kind: build
        with:
          destination: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/fitness-planner:${{ cloudbees.scm.sha }},docker.io/${{ secrets.DOCKERHUB_USERNAME }}/fitness-planner:latest
          context: .
          dockerfile: ./Dockerfile
