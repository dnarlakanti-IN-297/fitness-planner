# CloudBees Unify Main CI Workflow
# ✅ Updated with correct CloudBees Unify syntax

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: CI Workflow

# Triggers
on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

# CloudBees Unify permissions
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: read

jobs:
  # Job 1: Test with Smart Tests
  test:
    env:
      SMART_TESTS_TOKEN: ${{ secrets.SMART_TESTS_TOKEN }}

    steps:
      # Step 1: Checkout code with full history for Smart Tests
      - name: Checkout code
        uses: cloudbees-io/checkout@v1
        with:
          fetch-depth: 0  # Full git history for better test predictions

      # Step 2: Verify Smart Tests connectivity
      - name: Verify Smart Tests connectivity
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "Verifying Smart Tests configuration..."
          smart-tests verify || true
          echo "✅ Smart Tests verified"

      # Step 3: Record build with Smart Tests
      - name: Record build with Smart Tests
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "📝 Recording build context..."
          smart-tests record build --build ${{ cloudbees.run_id }} --source app=.
          echo "✅ Build recorded: ${{ cloudbees.run_id }}"

      # Step 4: Record session with Smart Tests
      - name: Record session with Smart Tests
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "📝 Recording observation session..."
          smart-tests record session --build ${{ cloudbees.run_id }} --observation --test-suite pytest-unit-integration-tests > session.txt
          cat session.txt
          echo "✅ Session recorded"

      # Step 5: Collect all tests with pytest
      - name: Collect tests with pytest
        uses: docker://python:3.11-slim
        shell: sh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          echo "🔍 Collecting all tests with pytest..."

          # Collect all tests - only capture test node IDs (lines with ::)
          pytest --collect-only -qq tests/ 2>&1 | grep "::" > all_tests.txt || echo "tests/" > all_tests.txt

          echo "📋 Collected tests:"
          cat all_tests.txt

          TEST_COUNT=$(wc -l < all_tests.txt | tr -d ' ')
          echo "📊 Total: $TEST_COUNT tests collected"

      # Step 6: Generate Smart Tests subset
      - name: Generate Smart Tests subset
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "🎯 Generating Smart Tests subset..."

          # Generate subset with --session (REQUIRED despite reference docs)
          if smart-tests subset --session @session.txt pytest < all_tests.txt > subset-full.txt 2>&1; then
            echo "✅ Subset command succeeded"
          else
            EXIT_CODE=$?
            echo "❌ Subset command failed with exit code: $EXIT_CODE"
            echo ""
            echo "📋 Error output:"
            cat subset-full.txt
            echo ""
            echo "⚠️ Falling back to running all tests"
            cp all_tests.txt subset-full.txt
          fi

          echo ""
          echo "📊 Smart Tests full output:"
          cat subset-full.txt

          # Extract ONLY test paths (lines with ::) for pytest to run
          echo ""
          echo "📋 Extracting test paths..."
          grep "::" subset-full.txt > subset.txt 2>/dev/null || cp all_tests.txt subset.txt

          echo "✅ Clean test list for pytest:"
          head -10 subset.txt
          echo "..."

          # Count tests in subset
          SUBSET_COUNT=$(wc -l < subset.txt | tr -d ' ')
          TOTAL_COUNT=$(wc -l < all_tests.txt | tr -d ' ')

          echo ""
          echo "📊 Tests: $SUBSET_COUNT / $TOTAL_COUNT"

          if [ "$SUBSET_COUNT" -lt "$TOTAL_COUNT" ]; then
            echo "🎯 Smart Tests created subset! Saving $((100 - SUBSET_COUNT * 100 / TOTAL_COUNT))% of test time"
          else
            echo "📚 Running all tests (learning phase or no changes detected)"
          fi

      # Step 7: Run tests from subset
      - name: Run tests from Smart Tests subset
        uses: docker://python:3.11-slim
        shell: sh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          echo "🧪 Running tests from Smart Tests subset..."

          # Debug: Check subset.txt content
          if [ -f subset.txt ]; then
            echo "✅ subset.txt found"
            TEST_COUNT=$(wc -l < subset.txt | tr -d ' ')
            echo "📊 Tests to run: $TEST_COUNT"
            echo ""
            echo "First 5 tests:"
            head -5 subset.txt
            echo ""
          else
            echo "❌ subset.txt NOT found!"
            exit 1
          fi

          # Run tests using @subset.txt syntax (reference implementation)
          # In observation mode, this runs all tests
          # In production mode, only runs tests in subset.txt
          pytest @subset.txt \
            -v \
            -o junit_family=legacy \
            --junit-xml=test-results.xml \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term || true

          echo "✅ Tests completed"

          # Verify test results were generated
          if [ -f test-results.xml ]; then
            echo "✅ test-results.xml generated"
            ls -lh test-results.xml
          else
            echo "❌ test-results.xml NOT generated - tests did not run!"
          fi

      # Step 8: Record test results with Smart Tests
      - name: Record test results with Smart Tests
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "📝 Recording test results with Smart Tests..."

          # Record test results
          # NOTE: --session IS required despite reference docs not showing it
          if [ -f test-results.xml ]; then
            echo "Found test-results.xml"
            ls -lh test-results.xml

            # Record results with Smart Tests (session required)
            smart-tests record tests --session @session.txt pytest test-results.xml

            echo "✅ Test results recorded successfully"
          else
            echo "⚠️ test-results.xml not found"
            exit 1
          fi

      # Step 9: Publish test results
      - name: Publish test results
        uses: cloudbees-io/publish-test-results@v2
        with:
          test-type: JUNIT
          results-path: test-results.xml

      # Step 10: Extract test summary
      - name: Extract test summary
        id: test-summary
        uses: docker://alpine:latest
        shell: sh
        run: |
          apk add --no-cache grep
          TOTAL=$(grep -oP 'tests="\K[0-9]+' test-results.xml || echo "0")
          FAILURES=$(grep -oP 'failures="\K[0-9]+' test-results.xml || echo "0")
          ERRORS=$(grep -oP 'errors="\K[0-9]+' test-results.xml || echo "0")
          PASSED=$((TOTAL - FAILURES - ERRORS))
          echo "$TOTAL" > $CLOUDBEES_OUTPUTS/TOTAL_TESTS
          echo "$PASSED" > $CLOUDBEES_OUTPUTS/PASSED_TESTS
          echo "$FAILURES" > $CLOUDBEES_OUTPUTS/FAILED_TESTS

      # Step 11: Publish test evidence
      - name: Publish test evidence
        uses: ./.cloudbees/components/publish-test-evidence
        with:
          total-tests: ${{ steps.test-summary.outputs.TOTAL_TESTS }}
          passed-tests: ${{ steps.test-summary.outputs.PASSED_TESTS }}
          failed-tests: ${{ steps.test-summary.outputs.FAILED_TESTS }}

  # Job 2: Build and Push Docker Image
  # Calls the reusable build workflow
  build:
    needs: test
    uses: ./.cloudbees/workflows/build-reusable.yml
    with:
      image-name: fitness-planner
      dockerfile-path: ./Dockerfile
      context: .
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # Note: Deployment is handled separately through Unify Releases
  # Do not auto-deploy on every push - use release workflow instead
