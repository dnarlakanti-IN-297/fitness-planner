# CloudBees Unify Main CI Workflow
# ✅ Updated with correct CloudBees Unify syntax

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: CI Workflow

# Triggers
on:
  push:
    branches:
      - main
      - develop
  # TODO: Verify manual trigger in CloudBees Unify
  # GitHub uses 'workflow_dispatch' - check if CloudBees is the same
  workflow_dispatch:

# CloudBees Unify permissions
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: read

jobs:
  # Job 1: Test
  test:
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      # Step 2: Install dependencies and run tests in Python container
      - name: Install dependencies and run tests
        uses: docker://python:3.11-slim
        shell: sh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=app --cov-report=xml --cov-report=html --cov-report=term

      # Step 3: Publish test results
      - name: Publish test results
        uses: cloudbees-io/publish-test-results@v2
        with:
          test-type: JUNIT
          results-path: test-results.xml

      # Step 4: Extract test summary
      - name: Extract test summary
        id: test-summary
        uses: docker://alpine:latest
        shell: sh
        run: |
          apk add --no-cache grep
          TOTAL=$(grep -oP 'tests="\K[0-9]+' test-results.xml || echo "0")
          FAILURES=$(grep -oP 'failures="\K[0-9]+' test-results.xml || echo "0")
          ERRORS=$(grep -oP 'errors="\K[0-9]+' test-results.xml || echo "0")
          PASSED=$((TOTAL - FAILURES - ERRORS))
          echo "$TOTAL" > $CLOUDBEES_OUTPUTS/TOTAL_TESTS
          echo "$PASSED" > $CLOUDBEES_OUTPUTS/PASSED_TESTS
          echo "$FAILURES" > $CLOUDBEES_OUTPUTS/FAILED_TESTS

      # Step 5: Publish test evidence
      - name: Publish test evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            # Fitness Planner - Test Execution Evidence

            ## Summary
            - **Total Test Cases**: ${{ steps.test-summary.outputs.TOTAL_TESTS }}
            - **Passed**: ${{ steps.test-summary.outputs.PASSED_TESTS }}
            - **Failed**: ${{ steps.test-summary.outputs.FAILED_TESTS }}

            ## Workflow Information
            - **Run ID**: ${{ cloudbees.run_id }}
            - **Branch**: ${{ cloudbees.scm.branch }}
            - **Commit**: ${{ cloudbees.scm.sha }}

            ## Test Details
            - **Test Framework**: pytest
            - **Test Type**: JUNIT XML
            - **Results File**: test-results.xml

  # Job 2: Build and Push Docker Image
  build:
    needs: test
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Configure Docker Hub credentials
        id: dockerconfig
        uses: cloudbees-io/configure-oci-credentials@v1
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: kaniko-build
        uses: cloudbees-io/kaniko@v1
        kind: build
        with:
          destination: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/fitness-planner:${{ cloudbees.scm.sha }},docker.io/${{ secrets.DOCKERHUB_USERNAME }}/fitness-planner:latest
          context: .
          dockerfile: ./Dockerfile

      # Publish build evidence
      - name: Publish build evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Build Evidence
            - Run ID: ${{ cloudbees.run_id }}
            - Branch: ${{ cloudbees.scm.branch }}
            - Commit: ${{ cloudbees.scm.sha }}
            - Docker Image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/fitness-planner:${{ cloudbees.scm.sha }}
            - Build Status: Successfully built and pushed to Docker Hub
