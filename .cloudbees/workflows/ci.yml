# CloudBees Unify Main CI Workflow
# ✅ Updated with correct CloudBees Unify syntax

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: CI Workflow

# Triggers
on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

# CloudBees Unify permissions
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: read

jobs:
  # Job 1: Test with Smart Tests
  test:
    env:
      SMART_TESTS_TOKEN: ${{ secrets.SMART_TESTS_TOKEN }}

    steps:
      # Step 1: Checkout code with full history for Smart Tests
      - name: Checkout code
        uses: cloudbees-io/checkout@v1
        with:
          fetch-depth: 0  # Full git history for better test predictions

      # Step 2: Verify Smart Tests connectivity
      - name: Verify Smart Tests connectivity
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "Verifying Smart Tests configuration..."
          smart-tests verify || true
          echo "✅ Smart Tests verified"

      # Step 3: Record build with Smart Tests
      - name: Record build with Smart Tests
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "📝 Recording build context..."
          smart-tests record build --build ${{ cloudbees.run_id }} --source app=.
          echo "✅ Build recorded: ${{ cloudbees.run_id }}"

      # Step 4: Record session with Smart Tests
      - name: Record session with Smart Tests
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "📝 Recording observation session..."
          smart-tests record session --build ${{ cloudbees.run_id }} --observation --test-suite pytest-unit-integration-tests > session.txt
          cat session.txt
          echo "✅ Session recorded"

      # Step 5: Create Smart Tests subset (optional during learning phase)
      - name: Create Smart Tests subset
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "🎯 Creating Smart Tests intelligent subset..."

          # Create intelligent subset based on code changes
          # Note: Smart Tests needs ~1 day to build historical data
          # During learning phase, this will fall back to running all tests
          smart-tests subset pytest \
            --session @session.txt \
            --target 50% \
            --get-tests-from-previous-sessions > smart-tests-subset.txt 2>&1 || true

          if [ -s smart-tests-subset.txt ]; then
            echo "📊 Smart Tests subset output:"
            cat smart-tests-subset.txt

            # Extract subset details (the table)
            echo ""
            echo "📈 Subset Statistics:"
            grep "Candidates\|Subset\|Total" smart-tests-subset.txt || echo "Learning phase active"

            # Extract actual test list (lines with tests/)
            grep -E "^tests/" smart-tests-subset.txt > test-subset-list.txt 2>/dev/null || echo "tests/" > test-subset-list.txt

            if [ "$(cat test-subset-list.txt)" != "tests/" ]; then
              echo ""
              echo "🎯 Smart Tests selected subset to run:"
              cat test-subset-list.txt

              TEST_COUNT=$(wc -l < test-subset-list.txt | tr -d ' ')
              echo "📊 Total: $TEST_COUNT test items selected"
            else
              echo "📚 Learning phase: Running all tests to build historical data"
            fi
          else
            echo "📚 Smart Tests is in learning phase (~1 day required)"
            echo "Running all tests to build code-to-test mappings"
            echo "tests/" > test-subset-list.txt
          fi

      # Step 6: Run tests with Smart Tests subset
      - name: Run Smart Tests subset
        uses: docker://python:3.11-slim
        shell: sh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          echo "🧪 Running Smart Tests subset..."

          # Check if we have a specific test subset
          if [ -f test-subset-list.txt ] && [ -s test-subset-list.txt ] && [ "$(cat test-subset-list.txt)" != "tests/" ]; then
            echo "Running Smart Tests intelligent subset..."

            # Run the specific tests from the subset
            # Each line is a test file or test node ID
            echo "Selected tests:"
            while IFS= read -r test_path; do
              echo "  - $test_path"
            done < test-subset-list.txt

            cat test-subset-list.txt | xargs pytest -v --tb=short --junitxml=test-results.xml --cov=app --cov-report=xml --cov-report=html --cov-report=term
          else
            echo "Running full test suite..."
            echo "Reason: First run or Smart Tests learning phase"
            pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=app --cov-report=xml --cov-report=html --cov-report=term
          fi

          echo "✅ Tests completed"

      # Step 7: Record test results with Smart Tests
      - name: Record test results with Smart Tests
        uses: docker://cloudbeesdemo/maven-st:v1
        shell: sh
        run: |
          echo "📝 Recording test results with Smart Tests..."

          # Record test results for Smart Tests learning
          # This helps Smart Tests understand which tests passed/failed
          # and improve future subset predictions
          smart-tests record tests \
            --session @session.txt \
            --no-build \
            pytest test-results.xml || true

          echo "✅ Test results recorded"
          echo "Smart Tests will use this data to improve future test selection"

      # Step 9: Publish test results
      - name: Publish test results
        uses: cloudbees-io/publish-test-results@v2
        with:
          test-type: JUNIT
          results-path: test-results.xml

      # Step 10: Extract test summary
      - name: Extract test summary
        id: test-summary
        uses: docker://alpine:latest
        shell: sh
        run: |
          apk add --no-cache grep
          TOTAL=$(grep -oP 'tests="\K[0-9]+' test-results.xml || echo "0")
          FAILURES=$(grep -oP 'failures="\K[0-9]+' test-results.xml || echo "0")
          ERRORS=$(grep -oP 'errors="\K[0-9]+' test-results.xml || echo "0")
          PASSED=$((TOTAL - FAILURES - ERRORS))
          echo "$TOTAL" > $CLOUDBEES_OUTPUTS/TOTAL_TESTS
          echo "$PASSED" > $CLOUDBEES_OUTPUTS/PASSED_TESTS
          echo "$FAILURES" > $CLOUDBEES_OUTPUTS/FAILED_TESTS

      # Step 11: Publish test evidence using reusable component
      - name: Publish test evidence
        uses: ./.cloudbees/components/publish-test-evidence
        with:
          total-tests: ${{ steps.test-summary.outputs.TOTAL_TESTS }}
          passed-tests: ${{ steps.test-summary.outputs.PASSED_TESTS }}
          failed-tests: ${{ steps.test-summary.outputs.FAILED_TESTS }}

  # Job 2: Build and Push Docker Image
  # Calls the reusable build workflow
  build:
    needs: test
    uses: ./.cloudbees/workflows/build-reusable.yml
    with:
      image-name: fitness-planner
      dockerfile-path: ./Dockerfile
      context: .
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # Note: Deployment is handled separately through Unify Releases
  # Do not auto-deploy on every push - use release workflow instead
