# CloudBees Unify Main CI Workflow
# ✅ Updated with correct CloudBees Unify syntax

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: CI Workflow

# Triggers
on:
  push:
    branches:
      - main
      - develop
  # TODO: Verify manual trigger in CloudBees Unify
  # GitHub uses 'workflow_dispatch' - check if CloudBees is the same
  workflow_dispatch:

# CloudBees Unify permissions
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: read

jobs:
  # Job 1: Test
  test:
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      # Step 2: Set up Python
      - name: Set up Python
        # TODO: Verify CloudBees Python setup action
        # Look for: cloudbees-io/setup-python or similar
        uses: cloudbees-io/configure-python-version@v1
        with:
          version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        uses: docker://python:3.11-slim
        shell: sh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run tests
      - name: Run tests with pytest
        uses: docker://python:3.11-slim
        shell: sh
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results.xml

      # Step 5: Publish test results
      # TODO: Verify how CloudBees Unify publishes test results
      # Look for: cloudbees-io/publish-test-results or similar action
      - name: Publish test results
        uses: cloudbees-io/publish-test-results@v1
        with:
          file: test-results.xml

  # Job 2: Build
  # TODO: Verify how to call a reusable workflow in CloudBees Unify
  # This syntax might be different from GitHub Actions
  build:
    needs: test
    # TODO: Check if 'uses' is the correct way to call reusable workflow
    # Or if there's a different mechanism in CloudBees Unify
    uses: ./.cloudbees/workflows/build-reusable.yml
    with:
      image-name: fitness-planner
      dockerfile-path: './Dockerfile'
      context: '.'
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
