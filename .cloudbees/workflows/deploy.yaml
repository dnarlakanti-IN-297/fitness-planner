apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: deploy

on:
  workflow_call:
    inputs:
      artifact-id:
        type: string
        required: true
      environment:
        type: string
        required: true

jobs:
  deploy:
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
        with:
          repository: dnarlakanti-IN-297/fitness-planner
          fetch-depth: 0

      - name: Debug workspace
        uses: docker://alpine:latest
        shell: sh
        run: |
          echo "=== Current Directory ==="
          pwd
          echo ""
          echo "=== Directory Contents ==="
          ls -la
          echo ""
          echo "=== Chart Directory Check ==="
          if [ -d "chart" ]; then
            echo "✅ chart directory exists"
            ls -la chart/
          else
            echo "❌ chart directory NOT found"
          fi

      - name: Set kubeconfig
        uses: cloudbees-days/setup-kubeconfig
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Install helm chart
        uses: docker://alpine/helm:latest
        shell: sh
        run: |
          # Create values file
          cat > /tmp/values.yaml <<EOF
          image:
            url: docker.io/${{ vars.DOCKERHUB_USERNAME }}/fitness-planner:${{ inputs.artifact-id }}
          EOF

          echo "Installing Helm chart to namespace: ${{ vars.namespace }}"

          # Use helm upgrade --install (idempotent)
          helm upgrade --install fitness-planner ./chart \
            --namespace ${{ vars.namespace }} \
            --values /tmp/values.yaml \
            --wait \
            --timeout 5m

          echo "✅ Helm deployment successful!"

      - name: Get deployment info
        id: deploy-info
        uses: docker://bitnami/kubectl:latest
        shell: sh
        run: |
          EXTERNAL_IP=$(kubectl get service fitness-planner -n ${{ vars.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || echo "pending")
          echo "$EXTERNAL_IP" > $CLOUDBEES_OUTPUTS/EXTERNAL_IP
          echo "Service IP: $EXTERNAL_IP"

      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ inputs.artifact-id }}

      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Deployed to ${{ inputs.environment }}
            **Image:** docker.io/${{ vars.DOCKERHUB_USERNAME }}/fitness-planner:${{ inputs.artifact-id }}
            **Namespace:** ${{ vars.namespace }}
            **Service IP:** ${{ steps.deploy-info.outputs.EXTERNAL_IP }}
            **Health Check:** http://${{ steps.deploy-info.outputs.EXTERNAL_IP }}/health
          format: MARKDOWN
