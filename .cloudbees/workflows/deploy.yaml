apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: deploy

on:
  workflow_call:
    inputs:
      artifact-id:
        type: string
        required: true
      environment:
        type: string
        required: true
    secrets:
      KUBECONFIG:
        required: true

jobs:
  deploy:
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1

      - name: Set kubeconfig
        uses: cloudbees-days/setup-kubeconfig
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Update deployment manifest
        uses: docker://alpine:latest
        shell: sh
        run: |
          DOCKER_IMAGE="docker.io/${{ vars.DOCKERHUB_USERNAME }}/fitness-planner:${{ inputs.artifact-id }}"
          echo "Deploying image: $DOCKER_IMAGE"
          sed -i "s|IMAGE_PLACEHOLDER|$DOCKER_IMAGE|g" k8s/deployment.yaml

      - name: Deploy to Kubernetes
        uses: docker://bitnami/kubectl:latest
        shell: sh
        run: |
          kubectl apply -f k8s/service.yaml -n ${{ vars.namespace }}
          kubectl apply -f k8s/deployment.yaml -n ${{ vars.namespace }}
          kubectl rollout status deployment/fitness-planner -n ${{ vars.namespace }} --timeout=5m

      - name: Get deployment info
        id: deploy-info
        uses: docker://bitnami/kubectl:latest
        shell: sh
        run: |
          EXTERNAL_IP=$(kubectl get service fitness-planner -n ${{ vars.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || echo "pending")
          echo "$EXTERNAL_IP" > $CLOUDBEES_OUTPUTS/EXTERNAL_IP
          echo "Service IP: $EXTERNAL_IP"

      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ inputs.artifact-id }}

      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Deployed to ${{ inputs.environment }}
            **Image:** docker.io/${{ vars.DOCKERHUB_USERNAME }}/fitness-planner:${{ inputs.artifact-id }}
            **Namespace:** ${{ vars.namespace }}
            **Service IP:** ${{ steps.deploy-info.outputs.EXTERNAL_IP }}
            **Health Check:** http://${{ steps.deploy-info.outputs.EXTERNAL_IP }}/health
          format: MARKDOWN
