apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: deploy

on:
  workflow_call:
    inputs:
      artifact-id:
        type: string
        required: true
      environment:
        type: string
        required: true
      artifact-url:
        type: string
        required: true

jobs:
  deploy:
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
        with:
          repository: dnarlakanti-IN-297/fitness-planner
          fetch-depth: 0

      - name: Debug workspace
        uses: docker://alpine:latest
        shell: sh
        run: |
          echo "=== Current Directory ==="
          pwd
          echo ""
          echo "=== Directory Contents ==="
          ls -la
          echo ""
          echo "=== Chart Directory Check ==="
          if [ -d "chart" ]; then
            echo "✅ chart directory exists"
            ls -la chart/
          elsesdfsdf
            echo "❌ chart directory NOT found"
          fi

      - name: Set kubeconfig
        uses: cloudbees-days/setup-kubeconfig
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - id: install-chart
        name: Install helm chart
        uses: cloudbees-io/helm-install@v1
        with:
          chart-location: ${{ cloudbees.workspace }}/chart
          release-name: fitness-planner
          namespace: ${{ vars.namespace }}
          values: |
            url: ${{ inputs.artifact-url }}


      - name: Debug deployment status
        uses: docker://bitnami/kubectl:latest
        shell: sh
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployment fitness-planner -n ${{ vars.namespace }}

          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -l app=fitness-planner -n ${{ vars.namespace }}

          echo ""
          echo "=== Pod Details ==="
          kubectl describe pods -l app=fitness-planner -n ${{ vars.namespace }}

          echo ""
          echo "=== Pod Logs (if any) ==="
          kubectl logs -l app=fitness-planner -n ${{ vars.namespace }} --tail=50 || echo "No logs available yet"

      - name: Get deployment info
        id: deploy-info
        uses: docker://bitnami/kubectl:latest
        shell: sh
        run: |
          # Get ClusterIP (internal IP)
          CLUSTER_IP=$(kubectl get service fitness-planner -n ${{ vars.namespace }} -o jsonpath='{.spec.clusterIP}')
          echo "$CLUSTER_IP" > $CLOUDBEES_OUTPUTS/CLUSTER_IP

          # Get service port
          SERVICE_PORT=$(kubectl get service fitness-planner -n ${{ vars.namespace }} -o jsonpath='{.spec.ports[0].port}')
          echo "$SERVICE_PORT" > $CLOUDBEES_OUTPUTS/SERVICE_PORT

          echo "Service Type: ClusterIP (internal only)"
          echo "Cluster IP: $CLUSTER_IP"
          echo "Service Port: $SERVICE_PORT"
          echo "Internal URL: http://$CLUSTER_IP:$SERVICE_PORT"

      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ inputs.artifact-id }}

      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Deployed to ${{ inputs.environment }}
            **Image:** ${{ inputs.artifact-url }}
            **Artifact ID:** ${{ inputs.artifact-id }}
            **Namespace:** ${{ vars.namespace }}
            **Service Type:** ClusterIP (internal only)
            **Cluster IP:** ${{ steps.deploy-info.outputs.CLUSTER_IP }}
            **Service Port:** ${{ steps.deploy-info.outputs.SERVICE_PORT }}
            **Internal URL:** http://${{ steps.deploy-info.outputs.CLUSTER_IP }}:${{ steps.deploy-info.outputs.SERVICE_PORT }}

            _Note: Service is internal only due to namespace quota restrictions. Use port-forward for external access: `kubectl port-forward -n ${{ vars.namespace }} svc/fitness-planner 8080:80`_
          format: MARKDOWN
