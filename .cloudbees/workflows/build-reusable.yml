# CloudBees Unify Reusable Workflow for Building Docker Images with Kaniko
# ✅ Updated with correct CloudBees Unify syntax

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Build Reusable Workflow

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      dockerfile-path:
        required: false
        type: string
        default: './Dockerfile'
      context:
        required: false
        type: string
        default: '.'
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

# CloudBees Unify permissions format
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: read

jobs:
  build-and-push:
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      # Step 2: Configure Docker Hub credentials
      # ✅ Using CloudBees OCI credentials action
      - name: Configure Docker Hub credentials
        id: dockerconfig
        uses: cloudbees-io/configure-oci-credentials@v1
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Build and push with Kaniko
      # ✅ Using CloudBees Kaniko action with kind: build
      - name: Build and push Docker image
        id: kaniko-build
        uses: cloudbees-io/kaniko@v1
        kind: build
        with:
          destination: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:${{ cloudbees.scm.sha }},${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:latest
          context: ${{ inputs.context }}
          dockerfile: ${{ inputs.dockerfile-path }}

      # Step 4: Publish build evidence
      - name: Publish build evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Build Evidence
            - Run ID: ${{ cloudbees.run_id }}
            - Branch: ${{ cloudbees.scm.branch }}
            - Commit: ${{ cloudbees.scm.sha }}
            - Docker Image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:${{ cloudbees.scm.sha }}
            - Build Status: Successfully built and pushed to Docker Hub
