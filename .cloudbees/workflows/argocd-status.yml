apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: ArgoCD Status Check

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: 'ArgoCD application name'
        required: false
        default: 'fitness-planner'

permissions:
  id-token: read

jobs:
  check-argocd-status:
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Check ArgoCD application status
        id: argocd-status
        uses: docker://alpine:latest
        shell: sh
        run: |
          APP_NAME="${{ inputs.app-name }}"

          echo "📊 Checking ArgoCD application status: ${APP_NAME}"
          echo ""
          echo "Note: This is a placeholder for ArgoCD status check"
          echo "In production, you would:"
          echo "  1. Install kubectl and argocd CLI"
          echo "  2. Connect to cluster"
          echo "  3. Run: argocd app get ${APP_NAME}"
          echo "  4. Parse sync status, health status, and revision"
          echo ""

          # Placeholder values
          echo "synced" > $CLOUDBEES_OUTPUTS/sync_status
          echo "healthy" > $CLOUDBEES_OUTPUTS/health_status
          echo "main" > $CLOUDBEES_OUTPUTS/revision
          echo "2" > $CLOUDBEES_OUTPUTS/replicas

      - name: Publish ArgoCD status evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            # ArgoCD Application Status

            ## Application: ${{ inputs.app-name }}

            ### Current Status
            - **Sync Status**: `${{ steps.argocd-status.outputs.sync_status }}`
            - **Health Status**: `${{ steps.argocd-status.outputs.health_status }}`
            - **Revision**: `${{ steps.argocd-status.outputs.revision }}`
            - **Replicas**: `${{ steps.argocd-status.outputs.replicas }}`

            ### Workflow Context
            - **Run ID**: `${{ cloudbees.run_id }}`
            - **Triggered By**: `${{ cloudbees.actor }}`
            - **Timestamp**: `${{ cloudbees.run_number }}`

            ### Quick Access
            ```bash
            # View application in ArgoCD UI
            kubectl port-forward svc/argocd-server -n argocd 8080:443
            # Open: https://localhost:8080

            # Check via CLI
            argocd app get ${{ inputs.app-name }}

            # Check pods
            kubectl get pods -n fitness-planner

            # View recent deployments
            argocd app history ${{ inputs.app-name }}
            ```

            ### Health Indicators
            - ✅ **Synced** = Git and cluster match
            - ⚠️ **OutOfSync** = Git differs from cluster
            - ✅ **Healthy** = All resources running
            - ❌ **Degraded** = Some resources failing

            ---
            *ArgoCD Status Check via CloudBees Unify*
