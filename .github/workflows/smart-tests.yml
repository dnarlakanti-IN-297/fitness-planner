name: Smart Tests with Results Upload

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for Smart Tests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          pytest tests/ \
            -v \
            --junit-xml=test-results.xml \
            --cov=app \
            --cov-report=xml \
            --cov-report=html

      - name: Upload Smart Tests results
        uses: cloudbees-oss/smart-tests-results-upload-action@v1
        with:
          test-results-file: test-results.xml
          token: ${{ secrets.SMART_TESTS_TOKEN }}

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            htmlcov/
            coverage.xml

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results.xml
